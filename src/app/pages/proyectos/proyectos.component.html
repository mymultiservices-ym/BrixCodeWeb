<div class="proyectos-page">
  <div class="hero-section">
    <h1>Nuestros Proyectos</h1>
    <p>Casos de éxito que hablan por sí mismos</p>
  </div>

  <div class="proyectos-grid">
    <mat-card *ngFor="let proyecto of proyectos" class="proyecto-card">
      <div class="proyecto-placeholder">
        <mat-icon>code</mat-icon>
        <span>Proyecto {{proyecto.title}}</span>
      </div>
      <mat-card-header>
        <mat-card-title>{{proyecto.title}}</mat-card-title>
      </mat-card-header>
      <mat-card-content>
        <p>{{proyecto.description}}</p>
        <div class="technologies">
          <mat-chip-set>
            <mat-chip *ngFor="let tech of proyecto.technologies">{{tech}}</mat-chip>
          </mat-chip-set>
        </div>
      </mat-card-content>
      <mat-card-actions>
        <button mat-button color="primary" routerLink="/contacto">
          <mat-icon>visibility</mat-icon>
          Ver más
        </button>
        <button mat-button color="accent" routerLink="/contacto">
          <mat-icon>send</mat-icon>
          Proyecto similar
        </button>
      </mat-card-actions>
    </mat-card>
  </div>
</div>
